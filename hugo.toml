baseURL = 'https://caoyide.com/'
languageCode = 'zh-cn'
title = '曹义德律师专栏'
theme = 'PaperMod'

# 允许发布未来日期的文章
buildFuture = true

[params]
    # 1. 首页核心欢迎语（品牌第一印象）
    homeInfoParams = { Title = "曹义德 律师", Content = "华中科技大学法学硕士，前反贪检察官，现执业律师。<br>涉猎合规、职务犯罪辩护、民事商事刑事讼诉等各类案件。<br><br>视频号、抖音关注曹义德律师哦~" }
    
    # 2. 网站整体设置
    env = "production"
    defaultTheme = "auto"         # 自动切换深色/浅色模式
    ShowReadingTime = true        # 显示阅读时间
    ShowShareButtons = true       # 显示分享按钮
    ShowToc = true                # 文章显示目录
    
    # 3. 社交图标配置（方便客户一键联系你）
    [[params.socialIcons]]
        name = "phone"
        url = "tel:18872778990"   # 点击后手机可直接拨号
    [[params.socialIcons]]
        name = "email"
        url = "mailto:271333828@qq.com" # 建议换成您的真实邮箱

# 4. 导航栏设置
[[menu.main]]
    identifier = "posts"
    name = "法律文库"
    url = "/posts/"
    weight = 10
[[menu.main]]
    identifier = "categories"
    name = "按分类浏览"
    url = "/categories/"
    weight = 20

# 5. 页脚设置（展示执业信息，增强权威性）
[params.footer]
    hideCopyright = false
    # 这里放置您的执业证号和律所信息，非常关键
    text = "湖北江通律师事务所 | 执业证号：14201202110310748"