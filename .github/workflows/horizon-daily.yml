name: Daily AI News (Horizon)

on:
  schedule:
    - cron: '30 0 * * *'
      timezone: Asia/Shanghai
  workflow_dispatch:

permissions:
  contents: write

jobs:
  horizon-daily:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone Horizon repo
        run: |
          git clone https://github.com/heroyagami/Horizon.git Horizon-ai-news

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install Horizon
        run: |
          cd Horizon-ai-news
          uv sync

      - name: Write config file
        run: |
          echo '{"version":"1.0","ai":{"provider":"deepseek","model":"deepseek-chat","api_key_env":"DEEPSEEK_API_KEY","temperature":0.3,"max_tokens":4096,"throttle_sec":0,"analysis_concurrency":1,"enrichment_concurrency":1,"languages":["zh","en"]},"email":null,"sources":{"hackernews":{"enabled":true,"fetch_top_stories":30,"min_score":50},"rss":[{"name":"Simon Willison","url":"https://simonwillison.net/atom/everything/","enabled":true,"category":"ai-tools"}],"github":[{"type":"user_events","username":"anthropics","enabled":true},{"type":"repo_releases","owner":"anthropics","repo":"anthropic-sdk-python","enabled":true}],"reddit":{"enabled":true,"subreddits":[{"subreddit":"law","enabled":true,"sort":"hot","time_filter":"day","fetch_limit":10,"min_score":20},{"subreddit":"MachineLearning","enabled":true,"sort":"hot","time_filter":"day","fetch_limit":10,"min_score":50}],"users":[],"fetch_comments":3}},"filtering":{"ai_score_threshold":5.5,"time_window_hours":48},"webhook":{"enabled":false}}' > Horizon-ai-news/data/config.json

      - name: Patch orchestrator
        run: |
          sed -i 's|docs/_posts|content/posts/ai-daily|g' Horizon-ai-news/src/orchestrator.py

      - name: Debug config
        run: |
          echo "=== Config ==="
          cat Horizon-ai-news/data/config.json

      - name: Run Horizon
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          cd Horizon-ai-news
          uv run horizon --hours 48

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Horizon AI"
          git add content/posts/ai-daily/
          git diff --staged --quiet || git commit -m "📡 Horizon 日报 $(date +'%Y-%m-%d')"
          git push