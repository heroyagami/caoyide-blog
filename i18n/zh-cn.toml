# 主题 UI 字符串中文化覆盖
# 基于 themes/hugo-theme-stack/i18n/zh.toml 增强

toggleMenu = "切换菜单"
darkMode   = "暗色模式"

[list]
    page       = "共 {{ .Count }} 篇"
    section    = "分类"
    subsection = "子分类"

[article]
    back            = "返回"
    tableOfContents = "目录"
    relatedContent  = "相关文章"
    lastUpdatedOn   = "最后更新于"
    readingTime     = "阅读时长 {{ .Count }} 分钟"

    [article.alert]
        note      = "备注"
        tip       = "提示"
        important = "重要"
        warning   = "警告"
        caution   = "注意"

    [article.codeblock]
        copy   = "复制"
        copied = "已复制"

[notFound]
    title    = "404 页面不存在"
    subtitle = "您访问的页面可能已被删除或地址有误"

[widget]
    [widget.archives]
        title = "文章归档"
        more  = "更多"

    [widget.tagCloud]
        title = "标签云"

    [widget.categoriesCloud]
        title = "分类浏览"

[search]
    title       = "搜索"
    placeholder = "输入关键词搜索法律热点..."
    resultTitle = "找到 #PAGES_COUNT 个结果（用时 #TIME_SECONDS 秒）"

[footer]
    builtWith  = "由 {{ .Generator }} 提供技术支持"
    designedBy = "主题 {{ .Theme }} · 设计 {{ .DesignedBy }}"

[pagination]
    jumpToPage = "跳转到页码"
    jump       = "跳转"
    pressEnter = "按 Enter 键跳转"
