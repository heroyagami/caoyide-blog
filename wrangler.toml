# Cloudflare Pages 构建配置
# 文档：https://developers.cloudflare.com/pages/configuration/build-configuration/
#
# 关键：Pages 用的是 build_command + pages_build_output_dir（平铺）
# 不是 [build] command（那是 Workers 语法）
#
# 单项目 monorepo：主站 Hugo + 法条库 VuePress 共用同一个 output 目录 public/
# - Hugo（主站）输出到 public/
# - VuePress（法条库）输出到 public/laws/（由 build.sh 完成）
build_command = "bash build.sh"
pages_build_output_dir = "public"
